<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <div class="container">
    <header class="hero">
      <div class="brand">
        <span class="eyebrow">Admin Area</span>
        <h1 class="brand-wordmark"><span class="wm-med">Med</span><span class="wm-necta">necta</span></h1>
        <p class="muted">User management is restricted to administrator accounts.</p>
      </div>
      <div class="actions">
        <button id="themeToggle" class="btn secondary">Dark</button>
        <a class="btn" href="/dashboard">Back to Dashboard</a>
      </div>
    </header>

    <main class="admin-page-main">
      <section class="card">
        <h3>Admin Management</h3>
        <p class="muted">Manage users, clans, and reports with search and sorting controls.</p>
        <div class="row" style="justify-content:flex-start;margin-top:0.7rem">
          <button class="btn tiny-btn admin-tab-btn active" data-tab="users" type="button">Users</button>
          <button class="btn tiny-btn admin-tab-btn" data-tab="clans" type="button">Clans</button>
          <button class="btn tiny-btn admin-tab-btn" data-tab="reports" type="button">Reports</button>
        </div>
      </section>
      <section id="adminTabUsers" class="card">
        <h3 id="adminUsersTitle">Registered Users</h3>
        <div class="row" style="justify-content:flex-start">
          <input id="adminUsersSearch" type="text" placeholder="Search users..." />
          <button id="adminUsersSearchBtn" class="btn secondary tiny-btn" type="button">Search</button>
        </div>
        <div id="adminUsers" class="section-gap"></div>
      </section>
      <section id="adminTabClans" class="card hidden">
        <h3>Clans</h3>
        <div class="row" style="justify-content:flex-start">
          <input id="adminClansSearch" type="text" placeholder="Search clans..." />
          <select id="adminClansSort">
            <option value="members_desc">Most members</option>
            <option value="last_active_desc">Last active</option>
            <option value="reports_desc">Most reports</option>
            <option value="name_asc">Name A-Z</option>
          </select>
          <button id="adminClansSearchBtn" class="btn secondary tiny-btn" type="button">Apply</button>
        </div>
        <div id="adminClans" class="section-gap"></div>
      </section>
      <section id="adminTabReports" class="card hidden">
        <h3>Reports</h3>
        <div class="row" style="justify-content:flex-start">
          <input id="adminReportsSearch" type="text" placeholder="Search reports..." />
          <select id="adminReportsStatus">
            <option value="">All status</option>
            <option value="open">Open</option>
            <option value="reviewed">Reviewed</option>
            <option value="closed">Closed</option>
          </select>
          <button id="adminReportsSearchBtn" class="btn secondary tiny-btn" type="button">Search</button>
        </div>
        <div id="adminReports" class="section-gap"></div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
