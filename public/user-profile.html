<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Profile - MiniMedics</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="container">
    <header class="hero">
      <div class="brand">
        <h1>MiniMedics</h1>
      </div>
      <div class="actions">
        <button id="themeToggle" class="btn secondary">Dark</button>
        <a class="btn" href="/">Home</a>
        <a class="btn" href="/dashboard">Dashboard</a>
      </div>
    </header>
    <main class="layout" style="margin-top:1rem">
      <aside class="stack">
        <section id="publicProfileBox" class="card"></section>
      </aside>
      <section class="stack">
        <section class="card">
          <h3>User Posts</h3>
          <div id="publicProfileFeed" class="feed section-gap"></div>
        </section>
      </section>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
