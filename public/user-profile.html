<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Profile - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="light-mode">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="container">
    <header class="hero">
      <div class="brand">
        <h1 class="brand-wordmark"><span class="wm-med">Med</span><span class="wm-necta">necta</span></h1>
      </div>
      <div class="actions">
        <button id="themeToggle" class="btn secondary">Dark</button>
        <a class="btn" href="/dashboard">Home</a>
        <a class="btn" href="/dashboard">Dashboard</a>
      </div>
    </header>
    <main class="layout" style="margin-top:1rem">
      <aside class="stack">
        <section id="publicProfileBox" class="card"></section>
        <section class="card">
          <h3>Actions</h3>
          <div id="publicProfileActions" class="row" style="justify-content:flex-start;flex-wrap:wrap;gap:0.5rem"></div>
          <div id="reportUserFormWrap" class="stack" style="margin-top:0.8rem"></div>
        </section>
      </aside>
      <section class="stack">
        <section class="card">
          <h3>User Posts</h3>
          <div id="publicProfileFeed" class="feed section-gap"></div>
        </section>
      </section>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
