<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <button id="themeToggle" class="btn secondary auth-theme-btn" type="button">Dark</button>

  <main class="auth-shell">
    <section class="auth-intro">
      <span class="eyebrow">Welcome Back</span>
      <h1>Log in to Mednecta</h1>
      <p class="muted">Stay connected with your medical community and pick up where you left off.</p>
      <a class="btn secondary" href="/">Back to Home</a>
    </section>

    <section class="card auth-card">
      <h2>Log in</h2>
      <form id="loginForm" class="form">
        <input id="loginUser" placeholder="Username" required />
        <input id="loginPass" type="password" placeholder="Password" required />
        <label class="inline-check"><input id="rememberMe" type="checkbox" /> <span class="inline-check-text">Stay logged in for 7 days</span></label>
        <div class="row">
          <button class="btn primary" type="submit">Log in</button>
        </div>
      </form>
      <p class="muted auth-link"><a href="/forgot.html">Forgot password?</a></p>
      <p class="muted auth-link">New here? <a href="/register.html">Create an account</a></p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
