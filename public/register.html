<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page light-mode">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <button id="themeToggle" class="btn secondary auth-theme-btn" type="button">Dark</button>

  <main class="auth-shell">
    <section class="auth-intro">
      <span class="eyebrow">Join the Network</span>
      <h1>Create your Mednecta account</h1>
      <p class="muted">Share updates, build connections, and chat with peers in one place.</p>
      <a class="btn secondary" href="/">Back to Home</a>
    </section>

    <section class="card auth-card">
      <h2>Create account</h2>
      <form id="regForm" class="form">
        <input id="regName" placeholder="Full name" required />
        <input id="regEmail" type="email" placeholder="Email" required />
        <input id="regUser" placeholder="Username" required />
        <input id="regInstitute" placeholder="College / Institute / Workplace" required />
        <select id="regProgramType" required>
          <option value="">Select status</option>
          <option value="student">Student</option>
          <option value="professional">Working Professional</option>
        </select>
        <input id="regDegree" placeholder="Degree (MBBS/MD/MS/DM/MCh...)" />
        <input id="regAcademicYear" placeholder="Year (1st/2nd/3rd...)" />
        <select id="regSpecialityDomain">
          <option value="">Select domain (optional)</option>
        </select>
        <select id="regSpecialitySpecialty">
          <option value="">Select specialty</option>
        </select>
        <select id="regSpecialitySubspecialty">
          <option value="">Select subspecialty / topic</option>
        </select>
        <p id="regSpecialitySummary" class="muted">Select a medical domain and specialty if relevant.</p>
        <input id="regPass" type="password" placeholder="Password" required />
        <div class="row">
          <button class="btn primary" type="submit">Register</button>
        </div>
      </form>
      <p class="muted auth-link">Already have an account? <a href="/login.html">Log in</a></p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
