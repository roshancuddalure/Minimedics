<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Profile - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <div class="container">
    <header class="hero">
      <div class="brand">
        <span class="eyebrow">Profile Settings</span>
        <h1 class="brand-wordmark"><span class="wm-med">Med</span><span class="wm-necta">necta</span></h1>
        <p class="muted">Update your profile details and identity information.</p>
      </div>
      <div class="actions">
        <button id="themeToggle" class="btn secondary">Dark</button>
        <a class="btn" href="/dashboard">Back to Dashboard</a>
      </div>
    </header>

    <main class="stack" style="margin-top:1rem">
      <section class="card">
        <h3>Edit Profile</h3>
        <form id="profileEditForm" class="form">
          <input id="profileEditName" type="text" maxlength="120" placeholder="Full name" />
          <input id="profileEditNickname" type="text" maxlength="60" placeholder="Nickname" />
          <input id="profileEditEmail" type="email" placeholder="Email" />
          <select id="profileEditGender">
            <option value="">Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
            <option value="prefer_not_to_say">Prefer not to say</option>
          </select>
          <input id="profileEditDob" type="date" />
          <input id="profileEditPlaceFrom" type="text" maxlength="120" placeholder="Place from" />
          <input id="profileEditStatusDescription" type="text" maxlength="180" placeholder="Status description" />
          <textarea id="profileEditAchievements" maxlength="300" placeholder="Achievements (max 300 chars)"></textarea>
          <select id="privacyShowOnline">
            <option value="connections">Who can see me online - Connections</option>
            <option value="everyone">Who can see me online - Everyone</option>
            <option value="nobody">Who can see me online - Nobody</option>
          </select>
          <select id="privacyDiscoverability">
            <option value="everyone">Who can find me online - Everyone</option>
            <option value="nobody">Who can find me online - Nobody</option>
          </select>
          <select id="privacyInSuggestions">
            <option value="everyone">Who can find me in suggestions - Everyone</option>
            <option value="nobody">Who can find me in suggestions - Nobody</option>
          </select>
          <select id="privacyRequestPolicy">
            <option value="everyone">Who can send me requests - Everyone</option>
            <option value="link_only">Who can send me requests - Profile Link Only</option>
            <option value="nobody">Who can send me requests - Nobody</option>
          </select>
          <input id="profileEditInstitute" type="text" maxlength="180" placeholder="College / Institute / Workplace" />
          <select id="profileEditProgramType">
            <option value="">Program type</option>
            <option value="student">Student</option>
            <option value="professional">Working Professional</option>
          </select>
          <input id="profileEditDegree" type="text" maxlength="80" placeholder="Degree (MBBS/MD/MS/DM/MCh...)" />
          <input id="profileEditAcademicYear" type="text" maxlength="40" placeholder="Academic year" />
          <input id="profileEditSpeciality" type="text" maxlength="80" placeholder="Speciality" />
          <textarea id="profileEditBio" maxlength="400" placeholder="Bio (max 400 chars)"></textarea>
          <div class="row" style="justify-content:flex-start">
            <input id="specialitySuggestionInput" type="text" maxlength="120" placeholder="Speciality not listed? Suggest one" />
            <button id="specialitySuggestBtn" class="btn secondary" type="button">Suggest</button>
          </div>
          <div class="row">
            <button class="btn primary" type="submit">Save Changes</button>
          </div>
        </form>
      </section>
      <section id="savedPostsSection" class="card">
        <h3>Saved Posts</h3>
        <div class="row" style="justify-content:flex-start;gap:0.5rem;margin-top:0">
          <select id="savedListSelect"></select>
          <input id="newSavedListName" type="text" maxlength="40" placeholder="Create custom list" />
          <button id="createSavedListBtn" class="btn secondary" type="button">Create List</button>
        </div>
        <div id="savedPostsBox" class="feed section-gap"></div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
