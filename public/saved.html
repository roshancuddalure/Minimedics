<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Saved Posts - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <div class="container">
    <header class="hero">
      <div class="brand">
        <span class="eyebrow">Saved Library</span>
        <h1 class="brand-wordmark"><span class="wm-med">Med</span><span class="wm-necta">necta</span></h1>
        <p class="muted">Organize saved posts into custom lists and revisit them without digging through profile settings.</p>
      </div>
      <div class="actions">
        <button id="themeToggle" class="btn secondary">Dark</button>
        <a class="btn" href="/dashboard">Dashboard</a>
        <a class="btn" href="/profile">Profile</a>
        <a class="btn" href="/help-center.html">Help Center</a>
      </div>
    </header>

    <main class="stack saved-page-main" style="margin-top:1rem">
      <section class="card saved-page-sidebar">
        <h3>Manage Lists</h3>
        <p class="muted">Create focused collections like Cases, Exams, Protocols, or Research.</p>
        <div class="form section-gap">
          <input id="newSavedListName" type="text" maxlength="40" placeholder="Create custom list" />
          <button id="createSavedListBtn" class="btn primary" type="button">Create List</button>
        </div>
        <div class="section-gap">
          <label class="tool-label" for="savedListSelect">Current List</label>
          <select id="savedListSelect"></select>
        </div>
      </section>

      <section class="card saved-page-content">
        <div class="saved-page-head">
          <div>
            <h3>Saved Posts</h3>
            <p class="muted">Only posts that are already live appear here.</p>
          </div>
        </div>
        <div id="savedPostsBox" class="feed section-gap"></div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
