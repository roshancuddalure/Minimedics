<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page light-mode">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <button id="themeToggle" class="btn secondary auth-theme-btn" type="button">Dark</button>

  <main class="auth-shell">
    <section class="auth-intro">
      <span class="eyebrow">Account Recovery</span>
      <h1>Reset your password</h1>
      <p class="muted">Request a reset link by email. Then open the link and set a new password.</p>
      <a class="btn secondary" href="/login.html">Back to Login</a>
    </section>

    <section class="card auth-card">
      <h2>Forgot password</h2>
      <form id="forgotForm" class="form">
        <input id="forgotUser" placeholder="Username or email" />
        <input id="forgotToken" type="text" placeholder="Reset token from email link" class="hidden" />
        <input id="forgotNewPass" type="password" placeholder="New password (1 uppercase, 1 special, min 6)" class="hidden" />
        <input id="forgotConfirmPass" type="password" placeholder="Confirm new password" class="hidden" />
        <div class="row">
          <button id="forgotSubmitBtn" class="btn primary" type="submit">Send Reset Link</button>
        </div>
      </form>
      <p class="muted auth-link">Remembered it? <a href="/login.html">Log in</a></p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
