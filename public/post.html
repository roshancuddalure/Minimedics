<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Post - Mednecta</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="shortcut icon" href="/favicon.ico?v=2" />
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="light-mode">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="container">
    <header class="hero">
      <div class="brand">
        <h1 class="brand-wordmark"><span class="wm-med">Med</span><span class="wm-necta">necta</span></h1>
      </div>
      <div class="actions">
        <button id="themeToggle" class="btn secondary">Dark</button>
        <a class="btn" href="/dashboard">Dashboard</a>
        <a class="btn" href="/saved">Saved</a>
      </div>
    </header>
    <main class="layout" style="margin-top:1rem">
      <section class="stack">
        <section class="card">
          <div class="saved-page-head">
            <div>
              <p class="eyebrow">Direct View</p>
              <h3 style="margin:0">Shared Post</h3>
              <p class="muted" style="margin:0.25rem 0 0">This page opens a single post directly instead of searching for it in the feed.</p>
            </div>
          </div>
          <div id="singlePostBox" class="feed section-gap"></div>
        </section>
      </section>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
